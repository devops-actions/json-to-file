name: "Approve Dependabot PR's" 
on:
  pull_request:

permissions:
  contents: read
  
jobs:
  dependabot:
    permissions:
      contents: write
      pull-requests: write
      actions: write
    uses: devops-actions/.github/.github/workflows/approve-dependabot-pr.yml@3bb5c8505eb368f90cf87956f0cc4d84cb8554d1 # main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

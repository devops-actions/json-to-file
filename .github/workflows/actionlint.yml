name: Lint GitHub Actions workflows
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read
  pull-requests: write

jobs:
  actionlint:
    uses: devops-actions/.github/.github/workflows/actionlint.yml@686cfb7424be0c32c8fe4e9e335f4500c5e9978c # main
    permissions:
      contents: read
      pull-requests: write